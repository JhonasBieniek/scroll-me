<div class="shell">
  <div class="shell__column">
    @if (state.profileReel(); as reel) {
      <app-profile-reel />
    } @else if (state.tab() === 'feed') {
      <app-feed />
    } @else if (state.tab() === 'create') {
      <app-create-post />
    } @else {
      <app-profile />
    }

    @if (state.tab() !== 'create' && !state.profileReel()) {
      <nav class="shell__nav" aria-label="Navegação principal">
        <button
          type="button"
          class="shell__nav-btn"
          [class.shell__nav-btn--active]="state.tab() === 'feed'"
          aria-label="Feed"
          (click)="state.openFeed()"
        >
          <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
            @if (state.tab() === 'feed') {
              <path
                fill="currentColor"
                d="M22 23h-6.001a1 1 0 01-1-1v-5.455a2.997 2.997 0 10-5.993 0V22a1 1 0 01-1 1H2a1 1 0 01-1-1V11.543a1 1 0 01.293-.707l10-9.543a1 1 0 011.414 0l10 9.543a1 1 0 01.293.707V22a1 1 0 01-1 1z"
              />
            } @else {
              <path
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                d="M3 9.5L12 2l9 7.5V20a1 1 0 01-1 1h-5v-6H9v6H4a1 1 0 01-1-1V9.5z"
              />
            }
          </svg>
        </button>

        <button
          type="button"
          class="shell__nav-btn shell__nav-btn--create"
          aria-label="Criar publicação"
          (click)="openFilePicker()"
        >
          <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
            <path
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              d="M12 5v14M5 12h14"
            />
          </svg>
        </button>

        <button
          type="button"
          class="shell__nav-btn"
          [class.shell__nav-btn--active]="state.tab() === 'profile'"
          aria-label="Perfil"
          (click)="openOwnProfile()"
        >
          <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
            @if (state.tab() === 'profile') {
              <path
                fill="currentColor"
                d="M12 2a5 5 0 100 10 5 5 0 000-10zm0 12c-4.42 0-8 2.24-8 5v1h16v-1c0-2.76-3.58-5-8-5z"
              />
            } @else {
              <path
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                d="M20 21a8 8 0 00-16 0M12 13a5 5 0 100-10 5 5 0 000 10z"
              />
            }
          </svg>
        </button>
      </nav>
    }

    @if (state.editProfileOpen()) {
      <app-edit-profile-modal />
    }

    @if (state.loginPromptOpen()) {
      <app-login-prompt-modal />
    }
  </div>
</div>

<input
  #fileInput
  class="shell__file-input"
  type="file"
  accept="video/mp4,.mp4"
  (change)="onFilePicked($event)"
/>
